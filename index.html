<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Practice</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- モーダル（div実装） -->
  <section class="section" id="modal-div">
    <h2>モーダル（div実装）</h2>
    <button id="open-modal-div" class="btn">モーダルを開く</button>

    <div id="overlay-div" class="overlay">
      <div id="modal-div-box" class="modal">
        <h3>モーダルタイトル</h3>
        <p>モーダルの内容がここに入ります。</p>
        <button id="close-modal-div" class="btn">閉じる</button>
      </div>
    </div>
  </section>

  <!-- モーダル（dialog実装） -->
  <section class="section" id="modal-dialog">
    <h2>モーダル（dialog実装）</h2>
  </section>

  <!-- タブ切り替え -->
  <section class="section" id="tab">
    <h2>タブ切り替え</h2>
  </section>

  <!-- アニメーション（CSS） -->
  <section class="section" id="animation-css">
    <h2>アニメーション（CSS）</h2>
  </section>

  <!-- アニメーション（GSAP） -->
  <section class="section" id="animation-gsap">
    <h2>アニメーション（GSAP）</h2>
  </section>

  <!-- ハンバーガーメニュー -->
  <section class="section" id="hamburger">
    <h2>ハンバーガーメニュー</h2>
  </section>

  <!-- スクロールアニメーション -->
  <section class="section" id="scroll-animation">
    <h2>スクロールアニメーション</h2>
  </section>

  <script src="./main.js"></script>
</body>
</html>
